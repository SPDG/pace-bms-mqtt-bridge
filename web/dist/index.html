<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>PACE BMS MQTT Bridge</title>
  <link rel="stylesheet" href="/styles.css">
</head>
<body>
  <div class="app-shell">
    <aside id="rail" class="rail" aria-label="Navigation">
      <button id="rail-toggle" class="rail-toggle" type="button" title="Toggle navigation"><span class="toggle-mark"></span></button>
      <div class="rail-brand"><span>P</span><strong>PACE BMS</strong></div>
      <button class="rail-item active" type="button" data-tab="live"><span>B</span><strong>Live data</strong></button>
      <button class="rail-item" type="button" data-tab="ha"><span>H</span><strong>HA config</strong></button>
      <button class="rail-item" type="button" data-tab="settings"><span>S</span><strong>Settings</strong></button>
    </aside>

    <div class="workspace">
      <header class="topbar">
        <div>
          <h1 id="device-name">pace-main</h1>
          <p id="summary">Loading...</p>
        </div>
        <div id="top-status" class="top-status"></div>
      </header>

      <main class="content">
        <section id="view-live" class="tab-view active">
          <section class="hero-grid">
            <div id="power-overview"></div>
            <div id="services" class="service-grid"></div>
          </section>

          <section class="panel">
            <div class="panel-header">
              <div>
                <h2>Packs</h2>
                <p id="pack-subtitle"></p>
              </div>
            </div>
            <div id="packs" class="pack-grid"></div>
          </section>

          <section class="panel">
            <div class="panel-header">
              <div>
                <h2>Telemetry</h2>
                <p id="telemetry-subtitle"></p>
              </div>
            </div>
            <div class="table-wrap">
              <table>
                <thead><tr><th>Name</th><th>Value</th><th>Updated</th></tr></thead>
                <tbody id="telemetry"></tbody>
              </table>
            </div>
          </section>
        </section>

        <section id="view-ha" class="tab-view">
          <section class="panel">
            <div class="panel-header">
              <div>
                <h2>Home Assistant YAML</h2>
                <p>Generated as a Home Assistant sections view.</p>
              </div>
              <div class="panel-actions">
                <label class="mode-option"><input type="radio" name="ha-yaml-mode" value="dashboard" checked> Dashboard</label>
                <label class="mode-option"><input type="radio" name="ha-yaml-mode" value="tab"> Tab</label>
                <button class="action-button" type="button" data-copy-target="ha-yaml">Copy YAML</button>
              </div>
            </div>
            <div class="config-body">
              <p class="hint">If Home Assistant renamed an entity, keep the card structure and replace only the affected <code>entity:</code> value.</p>
              <pre><code id="ha-yaml"></code></pre>
            </div>
          </section>
        </section>

        <section id="view-settings" class="tab-view">
          <section class="settings-grid">
            <article class="panel settings-card">
              <div class="panel-header"><h2>Runtime</h2></div>
              <dl id="settings-runtime"></dl>
            </article>
            <article class="panel settings-card">
              <div class="panel-header"><h2>Serial</h2></div>
              <dl id="settings-serial"></dl>
            </article>
            <article class="panel settings-card">
              <div class="panel-header"><h2>MQTT</h2></div>
              <dl id="settings-mqtt"></dl>
            </article>
            <article class="panel settings-card">
              <div class="panel-header"><h2>Device</h2></div>
              <dl id="settings-device"></dl>
            </article>
          </section>
        </section>
      </main>
    </div>
  </div>
  <script src="/app.js"></script>
</body>
</html>
