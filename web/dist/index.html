<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>PACE BMS MQTT Bridge</title>
  <link rel="stylesheet" href="/styles.css">
</head>
<body>
  <div class="app-shell">
    <aside class="rail" aria-label="Navigation">
      <div class="rail-brand">P</div>
      <div class="rail-item active">B</div>
      <div class="rail-item">M</div>
      <div class="rail-item">H</div>
    </aside>

    <div class="workspace">
      <header class="topbar">
        <div>
          <h1 id="device-name">pace-main</h1>
          <p id="summary">Loading...</p>
        </div>
        <div id="top-status" class="top-status"></div>
      </header>

      <main class="content">
        <section class="hero-grid">
          <div id="power-overview"></div>
          <div id="services" class="service-grid"></div>
        </section>

        <section class="panel">
          <div class="panel-header">
            <div>
              <h2>Packs</h2>
              <p id="pack-subtitle"></p>
            </div>
          </div>
          <div id="packs" class="pack-grid"></div>
        </section>

        <section class="panel">
          <div class="panel-header">
            <div>
              <h2>Telemetry</h2>
              <p id="telemetry-subtitle"></p>
            </div>
          </div>
          <div class="table-wrap">
            <table>
              <thead><tr><th>Name</th><th>Value</th><th>Updated</th></tr></thead>
              <tbody id="telemetry"></tbody>
            </table>
          </div>
        </section>
      </main>
    </div>
  </div>
  <script src="/app.js"></script>
</body>
</html>
