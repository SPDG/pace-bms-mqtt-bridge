name: auto-tag

on:
  workflow_run:
    workflows:
      - ci
    branches:
      - main
    types:
      - completed

permissions:
  actions: write
  contents: write

concurrency:
  group: auto-tag-main
  cancel-in-progress: false

jobs:
  tag:
    if: github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout tested commit
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
          fetch-depth: 0

      - name: Create next patch tag
        id: tag
        env:
          SHA: ${{ github.event.workflow_run.head_sha }}
        run: |
          git fetch --tags --force

          if git tag --points-at "$SHA" | grep -Eq '^v[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "Commit $SHA already has a release tag."
            echo "created=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          LATEST="$(git tag --list 'v*' | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | sort -V | tail -n 1 || true)"
          if [ -z "$LATEST" ]; then
            NEXT="v0.0.1"
          else
            VERSION="${LATEST#v}"
            MAJOR="${VERSION%%.*}"
            REST="${VERSION#*.}"
            MINOR="${REST%%.*}"
            PATCH="${REST#*.}"
            PATCH=$((PATCH + 1))
            NEXT="v${MAJOR}.${MINOR}.${PATCH}"
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "$NEXT" "$SHA" -m "Release $NEXT"
          git push origin "$NEXT"

          echo "created=true" >> "$GITHUB_OUTPUT"
          echo "tag=$NEXT" >> "$GITHUB_OUTPUT"

      - name: Dispatch release workflow
        if: steps.tag.outputs.created == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.tag.outputs.tag }}
        run: gh workflow run release.yml --ref main --field tag="$TAG"
